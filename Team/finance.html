<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RewardRush Admin - Financial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .sidebar {
            transition: transform 0.3s ease-in-out;
        }
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }
        .nav-link.active {
            background-color: #374151; /* gray-700 */
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div id="sidebar" class="sidebar fixed z-30 inset-y-0 left-0 w-64 bg-gray-900 text-white p-6 space-y-6 md:relative md:translate-x-0">
            <a href="dashboard.html" class="text-white text-2xl font-bold flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
                <span>RewardRush</span>
            </a>

            <nav class="space-y-2">
                <a href="dashboard.html" class="nav-link flex items-center space-x-3 py-2 px-3 rounded-lg hover:bg-gray-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
                    <span>Dashboard</span>
                </a>
                <a href="users.html" class="nav-link flex items-center space-x-3 py-2 px-3 rounded-lg hover:bg-gray-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M15 21a6 6 0 00-9-5.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-3-5.197m0 0A4 4 0 0112 4.354m0 5.292a4 4 0 010-5.292" /></svg>
                    <span>Users</span>
                </a>
                <a href="quests.html" class="nav-link flex items-center space-x-3 py-2 px-3 rounded-lg hover:bg-gray-700 transition-colors">
                   <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                    <span>Quests</span>
                </a>
                <a href="jobs.html" class="nav-link flex items-center space-x-3 py-2 px-3 rounded-lg hover:bg-gray-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
                    <span>Jobs</span>
                </a>
                <a href="finance.html" class="nav-link active flex items-center space-x-3 py-2 px-3 rounded-lg hover:bg-gray-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                    <span>Financial</span>
                </a>
                <a href="analytics.html" class="nav-link flex items-center space-x-3 py-2 px-3 rounded-lg hover:bg-gray-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" /></svg>
                    <span>Analytics</span>
                </a>
                <a href="settings.html" class="nav-link flex items-center space-x-3 py-2 px-3 rounded-lg hover:bg-gray-700 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                    <span>Settings</span>
                </a>
            </nav>
        </div>

        <!-- Main content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-md p-4 flex justify-between items-center">
                <button id="menu-button" class="md:hidden text-gray-500">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <h1 class="text-xl font-semibold text-gray-800">Financial</h1>
                <div class="flex items-center space-x-4">
                    <span class="text-gray-600">Admin</span>
                    <img src="https://placehold.co/40x40/E2E8F0/4A5568?text=A" alt="Admin" class="rounded-full">
                </div>
            </header>
            
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
                 <div class="mb-6">
                    <h2 class="text-2xl font-semibold text-gray-800 mb-4">Transaction History</h2>
                     <div class="bg-white p-6 rounded-lg shadow-md">
                        <div class="mb-4">
                            <input id="transaction-search-input" type="text" placeholder="Search by user ID or transaction type..." class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div class="overflow-x-auto">
                            <table class="min-w-full bg-white">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm text-gray-600">Transaction ID</th>
                                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm text-gray-600">User ID</th>
                                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm text-gray-600">Amount</th>
                                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm text-gray-600">Type</th>
                                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm text-gray-600">Status</th>
                                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm text-gray-600">Timestamp</th>
                                    </tr>
                                </thead>
                                <tbody id="transaction-table-body" class="text-gray-700">
                                    <!-- Transaction rows will be injected here by JavaScript -->
                                </tbody>
                            </table>
                        </div>
                     </div>
                 </div>
                 
                 <div>
                    <h2 class="text-2xl font-semibold text-gray-800 mb-4">Payout Management</h2>
                     <div class="bg-white p-6 rounded-lg shadow-md">
                        <div class="overflow-x-auto">
                            <table class="min-w-full bg-white">
                                <thead class="bg-gray-50">
                                    <tr>
                                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm text-gray-600">User ID</th>
                                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm text-gray-600">Amount</th>
                                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm text-gray-600">Request Date</th>
                                        <th class="text-left py-3 px-4 uppercase font-semibold text-sm text-gray-600">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="payout-table-body" class="text-gray-700">
                                    <!-- Payout rows will be injected here by JavaScript -->
                                </tbody>
                            </table>
                        </div>
                     </div>
                 </div>
            </main>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const menuButton = document.getElementById('menu-button');
            const sidebar = document.getElementById('sidebar');

            if (menuButton) {
                menuButton.addEventListener('click', () => {
                    sidebar.classList.toggle('open');
                });
            }

            // --- Mock Data ---
            const mockTransactions = [
                { id: 'txn_123', userId: 1, amount: 50.00, type: 'Quest Reward', status: 'Completed', timestamp: '2025-07-10 10:00:00' },
                { id: 'txn_124', userId: 2, amount: 25.50, type: 'Affiliate Payout', status: 'Completed', timestamp: '2025-07-10 11:30:00' },
                { id: 'txn_125', userId: 3, amount: 100.00, type: 'Withdrawal', status: 'Pending', timestamp: '2025-07-11 09:00:00' },
                { id: 'txn_126', userId: 1, amount: 15.00, type: 'Job Payment', status: 'Completed', timestamp: '2025-07-11 14:00:00' },
                { id: 'txn_127', userId: 4, amount: 75.00, type: 'Withdrawal', status: 'Failed', timestamp: '2025-07-11 15:00:00' }
            ];

            const mockPayouts = [
                { userId: 3, amount: 100.00, requestDate: '2025-07-11 09:00:00' },
                { userId: 5, amount: 250.00, requestDate: '2025-07-11 12:00:00' }
            ];

            const transactionTableBody = document.getElementById('transaction-table-body');
            const payoutTableBody = document.getElementById('payout-table-body');
            const searchInput = document.getElementById('transaction-search-input');

            function renderTransactions(transactions) {
                transactionTableBody.innerHTML = '';
                if (transactions.length === 0) {
                    transactionTableBody.innerHTML = `<tr><td colspan="6" class="text-center py-4">No transactions found.</td></tr>`;
                    return;
                }
                transactions.forEach(tx => {
                    let statusColor;
                    switch(tx.status) {
                        case 'Completed': statusColor = 'bg-green-100 text-green-800'; break;
                        case 'Pending': statusColor = 'bg-yellow-100 text-yellow-800'; break;
                        case 'Failed': statusColor = 'bg-red-100 text-red-800'; break;
                    }
                    
                    const row = `
                        <tr>
                            <td class="py-3 px-4 border-b border-gray-200">${tx.id}</td>
                            <td class="py-3 px-4 border-b border-gray-200">${tx.userId}</td>
                            <td class="py-3 px-4 border-b border-gray-200">$${tx.amount.toFixed(2)}</td>
                            <td class="py-3 px-4 border-b border-gray-200">${tx.type}</td>
                            <td class="py-3 px-4 border-b border-gray-200"><span class="px-2 py-1 font-semibold leading-tight text-sm rounded-full ${statusColor}">${tx.status}</span></td>
                            <td class="py-3 px-4 border-b border-gray-200">${tx.timestamp}</td>
                        </tr>
                    `;
                    transactionTableBody.innerHTML += row;
                });
            }

            function renderPayouts(payouts) {
                payoutTableBody.innerHTML = '';
                 if (payouts.length === 0) {
                    payoutTableBody.innerHTML = `<tr><td colspan="4" class="text-center py-4">No pending payouts.</td></tr>`;
                    return;
                }
                payouts.forEach(payout => {
                    const row = `
                        <tr>
                            <td class="py-3 px-4 border-b border-gray-200">${payout.userId}</td>
                            <td class="py-3 px-4 border-b border-gray-200">$${payout.amount.toFixed(2)}</td>
                            <td class="py-3 px-4 border-b border-gray-200">${payout.requestDate}</td>
                            <td class="py-3 px-4 border-b border-gray-200">
                                <div class="flex items-center space-x-2">
                                    <button class="bg-green-500 hover:bg-green-600 text-white text-sm py-1 px-3 rounded-lg">Approve</button>
                                    <button class="bg-red-500 hover:bg-red-600 text-white text-sm py-1 px-3 rounded-lg">Reject</button>
                                </div>
                            </td>
                        </tr>
                    `;
                    payoutTableBody.innerHTML += row;
                });
            }

            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    const searchTerm = e.target.value.toLowerCase();
                    const filteredTransactions = mockTransactions.filter(tx => 
                        tx.id.toLowerCase().includes(searchTerm) ||
                        String(tx.userId).includes(searchTerm) ||
                        tx.type.toLowerCase().includes(searchTerm)
                    );
                    renderTransactions(filteredTransactions);
                });
            }

            // Initial render
            renderTransactions(mockTransactions);
            renderPayouts(mockPayouts);
        });
    </script>
</body>
</html>
