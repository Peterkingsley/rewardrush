<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Founder Login - RewardRush</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Three.js for Particle Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

    <style>
         :root {
            --primary-glow: #8b00ff;
            --secondary-glow: #00f0ff;
            --accent-glow: #39ff14;
            --danger-glow: #d63031;
            --dark-bg: #0a0a15;
            --mid-bg: #1a1a2e;
            --light-bg: #2a2a3e;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: #f0f2f5;
            cursor: none;
            transition: background-color 0.3s ease;
        }
        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        .cursor-dot, .cursor-outline {
            pointer-events: none; position: fixed; top: 50%; left: 50%;
            border-radius: 50%; opacity: 1; transform: translate(-50%, -50%);
            transition: opacity 0.3s ease-in-out, transform 0.1s ease-in-out;
        }
        .cursor-dot { width: 8px; height: 8px; background-color: var(--accent-glow); z-index: 10001; }
        .cursor-outline { width: 40px; height: 40px; background-color: rgba(139, 0, 255, 0.2); z-index: 10000; }
        
        .form-control {
            background: var(--light-bg);
            border-color: #4a5568;
            color: white;
        }
        .login-form {
            background: var(--mid-bg);
            border: 1px solid #4a5568;
        }
        .message {
            padding: 1rem; border-radius: 0.5rem; margin: 1rem 0;
            font-size: 0.9rem; text-align: center; display: none;
        }
        .message.error { background: rgba(214, 48, 49, 0.2); color: var(--danger-glow); border: 1px solid var(--danger-glow); display: block; }
    </style>
</head>
<body class="dark">

    <canvas id="bg-canvas"></canvas>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Login Form -->
    <div id="login-container" class="min-h-screen flex items-center justify-center p-4">
        <div class="login-form w-full max-w-sm p-8 rounded-2xl shadow-2xl">
            <div class="flex justify-center items-center mb-6">
                 <i class="fas fa-rocket text-purple-500 text-4xl"></i>
                 <h1 class="text-4xl font-bold text-center ml-3 font-montserrat">RewardRush</h1>
            </div>
            <h2 class="text-xl font-bold text-center mb-8 text-gray-400">Founder Login</h2>
            <div class="mb-4">
                <label for="username" class="block text-gray-400 text-sm font-bold mb-2">Username</label>
                <input type="text" id="username" class="form-control w-full p-3 rounded-lg" placeholder="admin">
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-400 text-sm font-bold mb-2">Password</label>
                <input type="password" id="password" class="form-control w-full p-3 rounded-lg" placeholder="••••••••••">
            </div>
            <div id="login-message" class="message"></div>
            <button class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-lg transition" onclick="login()">
                <i class="fas fa-sign-in-alt mr-2"></i> Login
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Authentication ---
            window.login = () => {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                const messageEl = document.getElementById('login-message');

                // In a real app, use a secure fetch call to your server.
                // This is a simple client-side check for demonstration.
                if (username === "admin" && password === "password123") {
                    localStorage.setItem('isLoggedIn', 'true');
                    window.location.href = 'founder_main_app.html'; // Redirect to the main app
                } else {
                    messageEl.textContent = 'Invalid credentials. Please try again.';
                    messageEl.className = 'message error';
                }
            };

            // --- Effects Initialization ---
            function initEffects() {
                 // Cursor effects
                const cursorDot = document.querySelector('.cursor-dot');
                const cursorOutline = document.querySelector('.cursor-outline');
                window.addEventListener('mousemove', (e) => {
                    cursorDot.style.left = `${e.clientX}px`;
                    cursorDot.style.top = `${e.clientY}px`;
                    cursorOutline.animate({ left: `${e.clientX}px`, top: `${e.clientY}px` }, { duration: 500, fill: "forwards" });
                });
                
                // Particle background
                let scene, camera, renderer, particles;
                const canvas = document.getElementById('bg-canvas');
                if (!canvas) return;
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 10000);
                camera.position.z = 1000;
                const pMaterial = new THREE.PointsMaterial({ color: 0x8b00ff, size: 1.5, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
                const pGeometry = new THREE.BufferGeometry();
                const pCount = 2000;
                const posArray = new Float32Array(pCount * 3);
                for (let i = 0; i < pCount * 3; i++) posArray[i] = (Math.random() - 0.5) * 2000;
                pGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                particles = new THREE.Points(pGeometry, pMaterial);
                scene.add(particles);
                renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                
                function animate() {
                    requestAnimationFrame(animate);
                    particles.rotation.y += 0.0001;
                    renderer.render(scene, camera);
                }
                animate();
            }

            initEffects();
        });
    </script>
</body>
</html>
