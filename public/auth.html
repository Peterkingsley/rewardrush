<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RewardRush - Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --primary-light: #a29bfe;
            --secondary: #00cec9;
            --dark: #2d3436;
            --darker: #1e272e;
            --light: #f5f6fa;
            --danger: #d63031;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
        }

        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .auth-panel {
            background-color: rgba(45, 52, 54, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(108, 92, 231, 0.2);
        }

        #reward-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .form-toggle-bg {
            background-color: rgba(30, 39, 46, 0.8);
        }

        .form-toggle-label::after {
            content: '';
            position: absolute;
            top: 0.25rem;
            left: 0.25rem;
            width: 50%;
            height: calc(100% - 0.5rem);
            background-color: var(--primary);
            border-radius: 9999px;
            transition: transform 0.3s ease;
        }

        .form-toggle-input:checked + .form-toggle-label::after {
            transform: translateX(calc(100% - 0.5rem));
        }
        
        .form-group-container {
            transition: max-height 0.5s ease-in-out, opacity 0.3s ease-in-out 0.2s;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .form-group-container.active {
            max-height: 500px;
            opacity: 1;
        }
        
        .error-message {
            color: var(--danger);
            font-size: 0.8rem;
            padding-left: 0.25rem;
            margin-top: 0.25rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="w-full max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-2 rounded-2xl shadow-2xl overflow-hidden auth-panel">
            
            <!-- Left Panel: Marketing -->
            <div class="relative p-8 md:p-12 text-white flex flex-col justify-center order-last lg:order-first">
                <canvas id="reward-canvas"></canvas>
                <div class="relative z-10 text-center lg:text-left">
                    <h1 class="text-4xl md:text-5xl font-bold leading-tight">Join the Rush.</h1>
                    <h2 class="text-4xl md:text-5xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-primary-light to-secondary leading-tight mb-6">Unlock Your Crypto Potential.</h2>
                    
                    <div id="benefits-carousel" class="relative h-24">
                        <!-- Benefits will be injected here by JS -->
                    </div>

                    <div class="mt-12 text-center">
                        <a href="#" class="text-sm text-gray-400 hover:text-secondary transition-colors">
                            Are you a Project or an Expert? <span class="font-semibold underline">Partner with RewardRush</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Right Panel: Form -->
            <div class="p-8 md:p-12 bg-darker/50">
                <div class="max-w-md mx-auto">
                    <!-- Form Toggle -->
                    <div class="form-toggle-bg p-1 rounded-full flex justify-between items-center mb-8 relative">
                        <input type="checkbox" id="form-toggle" class="hidden form-toggle-input">
                        <label for="form-toggle" class="form-toggle-label absolute inset-0 cursor-pointer"></label>
                        <button id="login-toggle-btn" class="w-1/2 text-center z-10 py-2 rounded-full font-semibold text-white transition-colors">Log In</button>
                        <button id="signup-toggle-btn" class="w-1/2 text-center z-10 py-2 rounded-full font-semibold text-gray-400 transition-colors">Sign Up</button>
                    </div>

                    <h2 id="form-title" class="text-3xl font-bold text-white mb-2">Welcome Back!</h2>
                    <p id="form-subtitle" class="text-gray-400 mb-6">Log in to access your account.</p>

                    <form id="auth-form" class="space-y-4">
                        <div id="fullName-container" class="form-group-container">
                            <label for="fullName" class="text-sm font-medium text-gray-300 sr-only">Full Name</label>
                            <div class="relative">
                                <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                                <input type="text" id="fullName" name="fullName" placeholder="Full Name" class="w-full bg-dark py-3 pl-12 pr-4 rounded-lg border-2 border-transparent focus:border-primary focus:outline-none transition-colors text-white">
                            </div>
                            <p id="fullName-error" class="error-message"></p>
                        </div>
                        <div class="form-group-container active">
                            <label for="username" class="text-sm font-medium text-gray-300 sr-only">Username</label>
                             <div class="relative">
                                <i class="fas fa-at absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                                <input type="text" id="username" name="username" placeholder="Username" class="w-full bg-dark py-3 pl-12 pr-4 rounded-lg border-2 border-transparent focus:border-primary focus:outline-none transition-colors text-white" required>
                            </div>
                            <p id="username-error" class="error-message"></p>
                        </div>
                        <div id="email-container" class="form-group-container">
                            <label for="email" class="text-sm font-medium text-gray-300 sr-only">Email</label>
                            <div class="relative">
                                <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                                <input type="email" id="email" name="email" placeholder="Email Address" class="w-full bg-dark py-3 pl-12 pr-4 rounded-lg border-2 border-transparent focus:border-primary focus:outline-none transition-colors text-white">
                            </div>
                            <p id="email-error" class="error-message"></p>
                        </div>
                        <div class="form-group-container active">
                            <label for="password" class="text-sm font-medium text-gray-300 sr-only">Password</label>
                            <div class="relative">
                                <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                                <input type="password" id="password" name="password" placeholder="Password" class="w-full bg-dark py-3 pl-12 pr-12 rounded-lg border-2 border-transparent focus:border-primary focus:outline-none transition-colors text-white" required>
                                <button type="button" id="password-toggle" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-primary-light">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                             <p id="password-error" class="error-message"></p>
                        </div>
                        
                        <p id="form-error" class="error-message text-center"></p>

                        <button type="submit" id="submit-btn" class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-indigo-500 transition-all duration-300 transform hover:scale-105 flex items-center justify-center">
                           <span id="submit-btn-text">Log In</span>
                           <i id="submit-spinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
                        </button>
                    </form>

                    <div class="relative flex py-5 items-center">
                        <div class="flex-grow border-t border-gray-700"></div>
                        <span class="flex-shrink mx-4 text-gray-500 text-sm">Or continue with</span>
                        <div class="flex-grow border-t border-gray-700"></div>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <button class="w-full bg-gray-800 text-white font-semibold py-3 rounded-lg hover:bg-gray-700 transition-colors flex items-center justify-center gap-2">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="w-full bg-gray-800 text-white font-semibold py-3 rounded-lg hover:bg-gray-700 transition-colors flex items-center justify-center gap-2">
                            <i class="fab fa-twitter"></i> Twitter
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    // --- Canvas Animation ---
    const canvas = document.getElementById('reward-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationFrameId;

    const center = { x: 0, y: 0, radius: 10 };

    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
        center.x = canvas.width / 2;
        center.y = canvas.height / 2;
        initParticles();
    }

    class Particle {
        constructor(x, y, radius, color) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.color = color;
            this.baseX = this.x;
            this.baseY = this.y;
            this.density = (Math.random() * 30) + 10;
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
            ctx.fillStyle = this.color;
            ctx.fill();
        }

        update(mouse) {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            let forceDirectionX = dx / distance;
            let forceDirectionY = dy / distance;
            let maxDistance = mouse.radius;
            let force = (maxDistance - distance) / maxDistance;
            let directionX = (forceDirectionX * force * this.density);
            let directionY = (forceDirectionY * force * this.density);

            if (distance < mouse.radius) {
                this.x -= directionX;
                this.y -= directionY;
            } else {
                if (this.x !== this.baseX) {
                    let dx = this.x - this.baseX;
                    this.x -= dx / 10;
                }
                if (this.y !== this.baseY) {
                    let dy = this.y - this.baseY;
                    this.y -= dy / 10;
                }
            }
        }
    }
    
    class Orb {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.5;
            this.vy = (Math.random() - 0.5) * 0.5;
            this.radius = Math.random() * 2 + 1;
            this.color = Math.random() > 0.5 ? 'rgba(108, 92, 231, 0.7)' : 'rgba(0, 206, 201, 0.7)';
        }
        
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
            ctx.fillStyle = this.color;
            ctx.fill();
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
    }

    function initParticles() {
        particles = [];
        for (let i = 0; i < 100; i++) {
            particles.push(new Orb());
        }
    }

    function connect() {
        let opacityValue = 1;
        for (let a = 0; a < particles.length; a++) {
            for (let b = a; b < particles.length; b++) {
                let distance = ((particles[a].x - particles[b].x) * (particles[a].x - particles[b].x)) +
                               ((particles[a].y - particles[b].y) * (particles[a].y - particles[b].y));

                if (distance < (canvas.width / 7) * (canvas.height / 7)) {
                    opacityValue = 1 - (distance / 20000);
                    ctx.strokeStyle = `rgba(162, 155, 254, ${opacityValue})`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(particles[a].x, particles[a].y);
                    ctx.lineTo(particles[b].x, particles[b].y);
                    ctx.stroke();
                }
            }
            
            let distToCenter = Math.sqrt(Math.pow(particles[a].x - center.x, 2) + Math.pow(particles[a].y - center.y, 2));
             if (distToCenter < 300) {
                 opacityValue = 1 - (distToCenter / 300);
                 ctx.strokeStyle = `rgba(0, 206, 201, ${opacityValue * 0.5})`;
                 ctx.lineWidth = 0.5;
                 ctx.beginPath();
                 ctx.moveTo(particles[a].x, particles[a].y);
                 ctx.lineTo(center.x, center.y);
                 ctx.stroke();
            }
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw central logo
        ctx.beginPath();
        ctx.arc(center.x, center.y, center.radius, 0, Math.PI * 2);
        const gradient = ctx.createRadialGradient(center.x, center.y, 0, center.x, center.y, center.radius * 2);
        gradient.addColorStop(0, 'rgba(108, 92, 231, 1)');
        gradient.addColorStop(0.5, 'rgba(108, 92, 231, 0.5)');
        gradient.addColorStop(1, 'rgba(108, 92, 231, 0)');
        ctx.fillStyle = gradient;
        ctx.fill();

        for (const particle of particles) {
            particle.update();
            particle.draw();
        }
        connect();
        animationFrameId = requestAnimationFrame(animate);
    }
    
    resizeCanvas();
    animate();
    window.addEventListener('resize', () => {
        cancelAnimationFrame(animationFrameId);
        resizeCanvas();
        animate();
    });

    // --- Benefits Carousel ---
    const benefits = [
        { icon: 'fa-graduation-cap', text: "Complete quests, master new skills, and earn crypto rewards. Your journey into web3 starts here." },
        { icon: 'fa-users', text: "Our platform is built on community. Refer friends, build your network, and earn commissions as they succeed." },
        { icon: 'fa-globe', text: "Connect with pioneering web3 founders, access exclusive affiliate programs, and get a head start on the future of decentralization." }
    ];
    let currentBenefit = 0;
    const carouselContainer = document.getElementById('benefits-carousel');
    
    function showBenefit(index) {
        const benefit = benefits[index];
        const benefitHTML = `
            <div class="absolute inset-0 flex items-center gap-4 animate-fade-in">
                <i class="fas ${benefit.icon} text-3xl text-secondary"></i>
                <p class="text-gray-300">${benefit.text}</p>
            </div>
        `;
        carouselContainer.innerHTML = benefitHTML;
    }

    function nextBenefit() {
        currentBenefit = (currentBenefit + 1) % benefits.length;
        showBenefit(currentBenefit);
    }
    
    showBenefit(currentBenefit);
    setInterval(nextBenefit, 5000);

    // --- Form Logic ---
    const formToggle = document.getElementById('form-toggle');
    const loginBtn = document.getElementById('login-toggle-btn');
    const signupBtn = document.getElementById('signup-toggle-btn');
    const formTitle = document.getElementById('form-title');
    const formSubtitle = document.getElementById('form-subtitle');
    const fullNameContainer = document.getElementById('fullName-container');
    const emailContainer = document.getElementById('email-container');
    const submitBtnText = document.getElementById('submit-btn-text');
    const authForm = document.getElementById('auth-form');

    let isSignUp = false;

    function setFormState(signUp) {
        isSignUp = signUp;
        formToggle.checked = isSignUp;

        // Clear all errors
        document.querySelectorAll('.error-message').forEach(el => {
            el.textContent = '';
            el.style.display = 'none';
        });
        
        if (isSignUp) {
            loginBtn.classList.replace('text-white', 'text-gray-400');
            signupBtn.classList.replace('text-gray-400', 'text-white');
            formTitle.textContent = 'Create an Account';
            formSubtitle.textContent = 'Join us and start earning!';
            fullNameContainer.classList.add('active');
            emailContainer.classList.add('active');
            submitBtnText.textContent = 'Create Account';
        } else {
            loginBtn.classList.replace('text-gray-400', 'text-white');
            signupBtn.classList.replace('text-white', 'text-gray-400');
            formTitle.textContent = 'Welcome Back!';
            formSubtitle.textContent = 'Log in to access your account.';
            fullNameContainer.classList.remove('active');
            emailContainer.classList.remove('active');
            submitBtnText.textContent = 'Log In';
        }
    }

    formToggle.addEventListener('change', () => setFormState(formToggle.checked));
    loginBtn.addEventListener('click', () => setFormState(false));
    signupBtn.addEventListener('click', () => setFormState(true));

    // Password Toggle
    const passwordInput = document.getElementById('password');
    const passwordToggle = document.getElementById('password-toggle');
    passwordToggle.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        passwordToggle.querySelector('i').classList.toggle('fa-eye');
        passwordToggle.querySelector('i').classList.toggle('fa-eye-slash');
    });

    // Form Submission
    authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submit-btn');
        const spinner = document.getElementById('submit-spinner');
        submitBtnText.style.display = 'none';
        spinner.style.display = 'inline-block';
        submitBtn.disabled = true;

        // Reset errors
        document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');

        const fullName = document.getElementById('fullName').value;
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Basic client-side validation
        let hasError = false;
        if (!username) {
             document.getElementById('username-error').textContent = 'Username is required.';
             document.getElementById('username-error').style.display = 'block';
             hasError = true;
        }
        if (!password) {
            document.getElementById('password-error').textContent = 'Password is required.';
            document.getElementById('password-error').style.display = 'block';
            hasError = true;
        } else if (password.length < 6) {
             document.getElementById('password-error').textContent = 'Password must be at least 6 characters.';
             document.getElementById('password-error').style.display = 'block';
             hasError = true;
        }
        
        if (isSignUp) {
            if (!fullName) {
                document.getElementById('fullName-error').textContent = 'Full name is required.';
                document.getElementById('fullName-error').style.display = 'block';
                hasError = true;
            }
            if (!email) {
                document.getElementById('email-error').textContent = 'Email is required.';
                document.getElementById('email-error').style.display = 'block';
                hasError = true;
            } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                 document.getElementById('email-error').textContent = 'Please enter a valid email.';
                 document.getElementById('email-error').style.display = 'block';
                 hasError = true;
            }
        }

        if (hasError) {
            submitBtnText.style.display = 'inline-block';
            spinner.style.display = 'none';
            submitBtn.disabled = false;
            return;
        }
        
        const endpoint = isSignUp ? '/signup' : '/login';
        const body = isSignUp ? { fullName, username, email, password } : { username, password };
        
        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await response.json();

            if (response.ok) {
                window.location.href = 'groweasy.html'; 
            } else {
                document.getElementById('form-error').textContent = data.error || 'An unexpected error occurred.';
                document.getElementById('form-error').style.display = 'block';
            }
        } catch (err) {
            console.error('Auth error:', err);
            document.getElementById('form-error').textContent = 'Could not connect to the server.';
            document.getElementById('form-error').style.display = 'block';
        } finally {
            submitBtnText.style.display = 'inline-block';
            spinner.style.display = 'none';
            submitBtn.disabled = false;
        }
    });
    
    // Add keyframes for carousel
    const styleSheet = document.createElement("style");
    styleSheet.type = "text/css";
    styleSheet.innerText = `
        @keyframes animate-fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: animate-fade-in 0.5s ease forwards; }
    `;
    document.head.appendChild(styleSheet);
});
</script>
</body>
</html>
