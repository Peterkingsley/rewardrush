<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Marketing Flyer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      background: #0A1F44;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .flyer {
      width: 1080px;
      height: 1920px;
      background: #0A1F44;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    /* Header Section */
    .header {
      padding: 60px;
      color: #FFFFFF;
      text-align: left;
    }

    .header .title {
      font-size: 40px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .header .title .highlight {
      color: #FFD700;
    }

    .header .tagline {
      font-size: 18px;
      font-weight: 300;
      color: #AAB1C5;
    }

    /* Image Area */
    .image-container {
      position: absolute;
      right: 0;
      top: 300px;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      overflow: hidden;
      z-index: 1;
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: blur(2px);
    }

    /* Middle Section */
    .middle {
      background: #FFFFFF;
      height: 800px;
      position: absolute;
      top: 600px;
      width: 100%;
      padding: 80px 60px;
      z-index: 0;
    }

    .middle h2 {
      font-size: 22px;
      font-weight: 700;
      color: #0A1F44;
      margin-bottom: 30px;
    }

    .middle ul {
      list-style: none;
    }

    .middle ul li {
      font-size: 16px;
      color: #6C7A89;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
    }

    .middle ul li::before {
      content: '';
      width: 8px;
      height: 8px;
      background: #0A1F44;
      border-radius: 50%;
      margin-right: 10px;
    }

    .cta-button {
      display: inline-block;
      text-decoration: none;
      background: #0A1F44;
      color: #FFFFFF;
      font-size: 18px;
      font-weight: 700;
      padding: 15px 40px;
      border-radius: 25px;
      margin-top: 30px;
      transition: background 0.3s;
    }

    .cta-button:hover {
      background: #1A3C77;
    }

    /* Bottom Section */
    .bottom {
      background: #FFD700;
      height: 520px;
      position: absolute;
      bottom: 0;
      width: 50%;
      right: 0;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      clip-path: polygon(50% 0%, 100% 0%, 100% 100%, 0% 100%);
    }

    .bottom p {
      font-size: 16px;
      color: #0A1F44;
      margin-bottom: 10px;
      font-weight: 400;
    }

    /* Geometric Curve */
    .curve {
      position: absolute;
      bottom: 520px;
      left: 0;
      width: 100%;
      height: 100px;
      background: #FFFFFF;
      clip-path: ellipse(80% 60% at 50% 100%);
      z-index: 0;
    }

    @media print {
      body {
        padding: 0;
      }
      .flyer {
        box-shadow: none;
      }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="flyer">
    <!-- Header -->
    <div class="header">
      <h1 class="title">Digital Marketing <span class="highlight">Agency</span></h1>
      <p class="tagline">Accelerate your online presence</p>
    </div>

    <!-- Image Area -->
    <div class="image-container">
      <img src="https://images.unsplash.com/photo-1615109398623-88346a601842?auto=format&fit=crop&w=600&h=600&q=80" alt="Man in suit">
    </div>

    <!-- Middle Section -->
    <div class="middle">
      <h2>OUR SERVICES</h2>
      <ul>
        <li>Digital Marketing</li>
        <li>Branding Strategy</li>
        <li>SEO Campaigns</li>
        <li>Mobile Application</li>
      </ul>
      <a href="#" class="cta-button">GET STARTED</a>
    </div>

    <!-- Bottom Section -->
    <div class="bottom">
      <p>Phone: +123-456-7890</p>
      <p>Website: www.reallygreatsite.com</p>
    </div>

    <!-- Geometric Curve -->
    <div class="curve"></div>
  </div>
</body>
</html>
