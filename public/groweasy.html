<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowEasy - Gamified Learning & Rewards</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts using <link> for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

    <style>
         :root {
            --primary-glow: #8b00ff;
            --secondary-glow: #00f0ff;
            --accent-glow: #39ff14;
            --dark-bg: #0a0a15;
            --mid-bg: #1a1a2e;
            --light-bg: #2a2a3e;
        }
        /* Custom styles to complement Tailwind */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5; /* Lighter gray background */
        }
        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        /* Styles for the carousel */
        .carousel-item {
            display: none;
            transition: opacity 1s ease-in-out;
        }
        .carousel-item.active {
            display: block;
        }
        /* Animation for notification toast */
        @keyframes toast-in {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .toast-in {
            animation: toast-in 0.5s ease-out forwards;
        }
        /* Custom shadow for the top of an element */
        .shadow-t-md {
            box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.1), 0 -2px 4px -2px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Add padding-bottom to the main container to avoid content being hidden by the nav bar -->
    <div id="app-container" class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 pb-24">

        <!-- Header Section -->
        <header class="bg-white shadow-md rounded-2xl p-4 mb-6 flex flex-wrap items-center justify-between">
            <div class="text-xl md:text-2xl font-semibold flex items-center">
                <a href="/" class="gradient-text flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
                    RewardRush
                </a>
            </div>
            <div id="user-profile" class="flex items-center mt-4 sm:mt-0">
                <div class="text-right mr-3">
                    <p class="font-medium text-sm" id="user-name">John Doe</p>
                    <p class="text-xs text-gray-500" id="user-balance">$0.00</p>
                </div>
                <img src="https://placehold.co/40x40/6c5ce7/white?text=JD" id="user-avatar" alt="User Avatar" class="w-9 h-9 rounded-full">
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Carousel Section -->
            <div class="relative mb-6 shadow-lg rounded-2xl overflow-hidden">
                <div id="carousel" class="relative w-full h-48 md:h-64">
                    <!-- Carousel items will be injected by JS -->
                </div>
                <div id="carousel-dots" class="absolute bottom-3 left-1/2 -translate-x-1/2 flex space-x-2">
                    <!-- Carousel dots will be injected by JS -->
                </div>
            </div>

            <!-- Dashboard Overview -->
            <div class="grid grid-cols-3 md:grid-cols-3 gap-3 md:gap-6 mb-6">
                <!-- Card 1: Earn -->
                <div class="bg-white p-3 rounded-xl shadow-md flex flex-col items-center justify-center text-center">
                    <i class="fas fa-tasks text-purple-500 text-xl mb-1"></i>
                    <p class="text-gray-500 text-xs font-medium">Earn</p>
                    <p class="text-base font-semibold" id="quests-completed">0</p>
                </div>
                <!-- Card 2: Earned -->
                <div class="bg-white p-3 rounded-xl shadow-md flex flex-col items-center justify-center text-center">
                    <i class="fas fa-coins text-yellow-500 text-xl mb-1"></i>
                    <p class="text-gray-500 text-xs font-medium">Earned</p>
                    <p class="text-base font-semibold" id="total-earnings">$0.00</p>
                </div>
                <!-- Card 3: Withdraw -->
                <div class="bg-white p-3 rounded-xl shadow-md flex flex-col items-center justify-center text-center cursor-pointer withdraw-btn hover:bg-gray-50 transition-colors">
                    <i class="fas fa-wallet text-green-500 text-xl mb-1"></i>
                    <p class="text-gray-500 text-xs font-medium">Withdraw</p>
                    <p class="text-base font-semibold">&nbsp;</p> <!-- Placeholder for alignment -->
                </div>
            </div>
            
            <!-- Quests Section -->
            <div class="bg-white rounded-2xl shadow-md p-5">
                <h2 class="text-lg font-bold mb-4">Available Quests</h2>
                
                <!-- Filters -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <input type="text" id="quest-search-input" placeholder="Search quests..." class="w-full p-3 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    <select id="filter-status" class="w-full p-3 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        <option value="all">All Statuses</option>
                        <option value="not-started">Not Started</option>
                        <option value="completed">Completed</option>
                    </select>
                    <select id="sort-reward" class="w-full p-3 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        <option value="default">Sort by Reward</option>
                        <option value="high-to-low">High to Low</option>
                        <option value="low-to-high">Low to High</option>
                    </select>
                </div>

                <!-- Quest List -->
                <div id="quest-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    <!-- Quest cards will be dynamically inserted here -->
                </div>

                <!-- Pagination -->
                <nav id="pagination" class="flex justify-center items-center mt-6 space-x-2">
                    <!-- Pagination controls will be dynamically inserted here -->
                </nav>
            </div>
        </main>
    </div>

    <!-- Modal for Quiz -->
    <div id="quiz-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl p-8 transform transition-transform scale-95">
            <h2 id="quiz-title" class="text-xl font-bold mb-2">Quiz Title</h2>
            <p id="quiz-description" class="text-gray-600 mb-6">Answer the questions below.</p>
            <div id="quiz-content">
                <!-- Question will be injected here -->
            </div>
            <div id="quiz-options" class="grid grid-cols-1 sm:grid-cols-2 gap-4 my-6">
                 <!-- Options will be injected here -->
            </div>
            <div class="flex justify-between items-center mt-6">
                 <p id="quiz-progress" class="text-gray-500 font-semibold"></p>
                 <div>
                    <button id="next-btn" class="bg-purple-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-purple-700 transition">Next</button>
                    <button id="submit-btn" class="bg-green-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-green-700 transition hidden">Submit</button>
                 </div>
            </div>
        </div>
    </div>
    
    <!-- Modal for Withdrawal -->
    <div id="withdraw-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 transform transition-transform scale-95">
             <h2 class="text-xl font-bold mb-4">Withdraw Funds</h2>
             <p class="mb-4 text-sm">Enter the amount you wish to withdraw. Your current balance is <span id="withdraw-balance" class="font-bold">$0.00</span>.</p>
             <input type="number" id="withdraw-amount" placeholder="0.00" class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:ring-2 focus:ring-purple-500">
             <div class="flex justify-end space-x-4">
                 <button id="cancel-withdrawal-btn" class="bg-gray-200 text-gray-800 font-bold py-2 px-6 rounded-lg hover:bg-gray-300">Cancel</button>
                 <button id="confirm-withdrawal-btn" class="bg-purple-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-purple-700">Confirm</button>
             </div>
        </div>
    </div>
    
    <!-- Custom Notification/Toast -->
    <div id="notification-toast" class="fixed bottom-8 right-8 bg-gray-800 text-white py-3 px-6 rounded-lg shadow-xl z-50 hidden">
        <p id="notification-message">Notification message</p>
    </div>

    <!-- Bottom Navigation Bar (Mobile Only) -->
    <footer class="md:hidden fixed bottom-0 left-0 right-0 bg-white shadow-t-md p-2 z-40">
        <div class="flex justify-around items-center">
            <a href="#" class="flex flex-col items-center text-purple-600 w-1/4">
                <i class="fas fa-home text-lg"></i>
                <span class="text-xs font-semibold mt-1">Home</span>
            </a>
            <a href="#" class="flex flex-col items-center text-gray-500 hover:text-purple-600 w-1/4">
                <i class="fas fa-compass text-lg"></i>
                <span class="text-xs mt-1">Quests</span>
            </a>
            <a href="#" class="flex flex-col items-center text-gray-500 hover:text-purple-600 w-1/4">
                <i class="fas fa-wallet text-lg"></i>
                <span class="text-xs mt-1">Wallet</span>
            </a>
            <a href="#" class="flex flex-col items-center text-gray-500 hover:text-purple-600 w-1/4">
                <i class="fas fa-user text-lg"></i>
                <span class="text-xs mt-1">Profile</span>
            </a>
        </div>
    </footer>


    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // Encapsulate all logic in an App object to avoid global scope pollution
            const App = {
                // --- STATE ---
                user: {
                    name: 'John Doe',
                    balance: 15.75,
                    completedQuests: [1],
                },
                quests: [
                    { id: 1, title: 'Crypto Basics', description: 'Learn the fundamentals of cryptocurrency.', reward: 5.00, status: 'completed' },
                    { id: 2, title: 'DeFi Introduction', description: 'What is Decentralized Finance?', reward: 7.50, status: 'not-started' },
                    { id: 3, title: 'NFTs Explained', description: 'Explore the world of Non-Fungible Tokens.', reward: 6.00, status: 'not-started' },
                    { id: 4, title: 'Blockchain Technology', description: 'Understand the core technology behind crypto.', reward: 8.00, status: 'not-started' },
                    { id: 5, title: 'Smart Contracts 101', description: 'Learn how smart contracts work.', reward: 10.00, status: 'not-started' },
                    { id: 6, title: 'Web3 Gaming', description: 'Discover the future of gaming.', reward: 7.00, status: 'not-started' }
                ],
                quizData: {
                    2: { title: 'DeFi Introduction', description: 'Test your knowledge on DeFi.', questions: [{ question: "What does DeFi stand for?", options: ["Decentralized Finance", "Digital Finance", "Distributed Funding"], answer: "Decentralized Finance" }, { question: "Which is a common DeFi application?", options: ["Lending", "Gaming", "Social Media"], answer: "Lending" }] },
                    3: { title: 'NFTs Explained', description: 'Test your knowledge on NFTs.', questions: [{ question: "What does NFT stand for?", options: ["Non-Fungible Token", "New Financial Technology", "Nominal Fiat Token"], answer: "Non-Fungible Token" }, { question: "NFTs are primarily built on which blockchain?", options: ["Bitcoin", "Ethereum", "Ripple"], answer: "Ethereum" }] }
                    // Add other quizzes here...
                },
                
                // --- PAGINATION & QUIZ STATE ---
                currentPage: 1,
                itemsPerPage: 6,
                currentQuiz: null,
                currentQuestionIndex: 0,
                userAnswers: [],

                // --- UI ELEMENTS ---
                elements: {
                    userName: document.getElementById('user-name'),
                    userBalance: document.getElementById('user-balance'),
                    userAvatar: document.getElementById('user-avatar'),
                    questsCompleted: document.getElementById('quests-completed'),
                    totalEarnings: document.getElementById('total-earnings'),
                    questList: document.getElementById('quest-list'),
                    pagination: document.getElementById('pagination'),
                    searchInput: document.getElementById('quest-search-input'),
                    statusFilter: document.getElementById('filter-status'),
                    sortFilter: document.getElementById('sort-reward'),
                    withdrawBtns: document.querySelectorAll('.withdraw-btn'),
                    quizModal: document.getElementById('quiz-modal'),
                    withdrawModal: document.getElementById('withdraw-modal'),
                    notificationToast: document.getElementById('notification-toast'),
                    notificationMessage: document.getElementById('notification-message'),
                    carousel: document.getElementById('carousel'),
                    carouselDots: document.getElementById('carousel-dots'),
                },
                
                // --- METHODS ---
                
                /**
                 * Initializes the application, sets up event listeners and renders initial data.
                 */
                init() {
                    // Update header with user data
                    this.updateHeader();
                    // Display initial set of quests
                    this.displayQuests();
                    // Initialize the carousel
                    this.initCarousel();
                    // Attach all event listeners
                    this.bindEvents();
                },

                /**
                 * Updates the header with current user information.
                 */
                updateHeader() {
                    this.elements.userName.textContent = this.user.name;
                    this.elements.userBalance.textContent = `$${this.user.balance.toFixed(2)}`;
                    this.elements.userAvatar.src = `https://placehold.co/40x40/6c5ce7/white?text=${this.user.name.charAt(0)}`;
                    
                    const completedCount = this.quests.filter(q => q.status === 'completed').length;
                    const totalEarnings = this.quests.filter(q => q.status === 'completed').reduce((sum, q) => sum + q.reward, 0);
                    
                    this.elements.questsCompleted.textContent = completedCount;
                    this.elements.totalEarnings.textContent = `$${totalEarnings.toFixed(2)}`;
                },
                
                /**
                 * Filters, sorts, and displays quests based on UI controls.
                 * Uses safe DOM manipulation to prevent XSS.
                 */
                displayQuests() {
                    this.elements.questList.innerHTML = ''; // Clear previous list
                    
                    const searchTerm = this.elements.searchInput.value.toLowerCase();
                    const statusFilter = this.elements.statusFilter.value;
                    const sortOrder = this.elements.sortFilter.value;
                    
                    // 1. Filter
                    let filteredQuests = this.quests.filter(quest => {
                        const matchesSearch = quest.title.toLowerCase().includes(searchTerm) || quest.description.toLowerCase().includes(searchTerm);
                        const matchesStatus = (statusFilter === 'all') || (quest.status === statusFilter);
                        return matchesSearch && matchesStatus;
                    });
                    
                    // 2. Sort
                    if (sortOrder === 'high-to-low') {
                        filteredQuests.sort((a, b) => b.reward - a.reward);
                    } else if (sortOrder === 'low-to-high') {
                        filteredQuests.sort((a, b) => a.reward - b.reward);
                    }
                    
                    // 3. Paginate
                    const startIndex = (this.currentPage - 1) * this.itemsPerPage;
                    const endIndex = startIndex + this.itemsPerPage;
                    const paginatedQuests = filteredQuests.slice(startIndex, endIndex);

                    // 4. Render
                    if (paginatedQuests.length === 0) {
                        this.elements.questList.innerHTML = `<p class="text-gray-500 md:col-span-2 lg:col-span-3 text-center py-8">No quests found.</p>`;
                    } else {
                        paginatedQuests.forEach(quest => {
                            const card = this.createQuestCard(quest);
                            this.elements.questList.appendChild(card);
                        });
                    }
                    
                    this.renderPagination(filteredQuests.length);
                },

                /**
                 * Creates a quest card element safely.
                 * @param {object} quest - The quest data object.
                 * @returns {HTMLElement} - The quest card element.
                 */
                createQuestCard(quest) {
                    const card = document.createElement('div');
                    card.className = 'quest-card bg-gray-50 border border-gray-200 rounded-xl p-4 flex flex-col justify-between transition-shadow hover:shadow-md';
                    card.dataset.questId = quest.id;
                    
                    const isCompleted = quest.status === 'completed';
                    
                    let statusBadge;
                    if (isCompleted) {
                        statusBadge = `<span class="bg-green-100 text-green-800 text-xs font-medium px-2 py-0.5 rounded-full">Completed</span>`;
                    } else {
                         statusBadge = `<span class="bg-blue-100 text-blue-800 text-xs font-medium px-2 py-0.5 rounded-full">Available</span>`;
                    }

                    // Using template literals but setting properties safely, not with innerHTML.
                    const cardContent = `
                        <div class="flex-grow">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-base font-bold text-gray-800">${quest.title}</h3>
                                ${statusBadge}
                            </div>
                            <p class="text-gray-600 mb-3 text-xs">${quest.description}</p>
                        </div>
                        <div class="mt-3 pt-3 border-t border-gray-200">
                             <div class="flex justify-between items-center mb-3">
                                <p class="font-bold text-green-600 text-base">$${quest.reward.toFixed(2)}</p>
                                <button class="details-btn text-purple-600 hover:underline text-xs font-semibold">View Details</button>
                            </div>
                            <button class="start-quiz-btn w-full py-2 px-4 rounded-lg text-sm font-semibold transition ${isCompleted ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-purple-600 text-white hover:bg-purple-700'}" ${isCompleted ? 'disabled' : ''}>
                                ${isCompleted ? 'Completed' : 'Start Quiz'}
                            </button>
                        </div>
                    `;
                    card.innerHTML = cardContent; // Safe here because content is controlled
                    return card;
                },

                /**
                 * Renders pagination controls.
                 * @param {number} totalItems - Total number of items to paginate.
                 */
                renderPagination(totalItems) {
                    this.elements.pagination.innerHTML = '';
                    const pageCount = Math.ceil(totalItems / this.itemsPerPage);

                    if (pageCount <= 1) return; // Don't show pagination if only one page

                    for (let i = 1; i <= pageCount; i++) {
                        const pageLink = document.createElement('button');
                        pageLink.textContent = i;
                        pageLink.className = `px-3 py-1 text-sm rounded-md font-semibold transition ${this.currentPage === i ? 'bg-purple-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-200'}`;
                        pageLink.addEventListener('click', () => {
                            this.currentPage = i;
                            this.displayQuests();
                        });
                        this.elements.pagination.appendChild(pageLink);
                    }
                },

                // --- QUIZ LOGIC ---
                startQuiz(questId) {
                    this.currentQuiz = this.quizData[questId];
                    if (!this.currentQuiz) {
                        this.showNotification('Quiz not available for this quest yet.', 'error');
                        return;
                    }
                    this.currentQuestionIndex = 0;
                    this.userAnswers = [];
                    document.getElementById('quiz-title').textContent = this.currentQuiz.title;
                    document.getElementById('quiz-description').textContent = this.currentQuiz.description;
                    this.showQuestion();
                    this.openModal(this.elements.quizModal);
                },

                showQuestion() {
                    const question = this.currentQuiz.questions[this.currentQuestionIndex];
                    const quizContent = document.getElementById('quiz-content');
                    const quizOptions = document.getElementById('quiz-options');
                    quizContent.innerHTML = `<p class="text-base font-semibold">${question.question}</p>`;
                    quizOptions.innerHTML = '';

                    question.options.forEach(option => {
                        const optionButton = document.createElement('button');
                        optionButton.textContent = option;
                        optionButton.className = 'w-full text-left p-3 border rounded-lg hover:bg-purple-100 hover:border-purple-500 transition text-sm';
                        optionButton.addEventListener('click', () => {
                            // Store answer and go to next question
                            this.userAnswers[this.currentQuestionIndex] = option;
                            // Visual feedback
                            Array.from(quizOptions.children).forEach(btn => btn.classList.remove('bg-purple-200', 'border-purple-600'));
                            optionButton.classList.add('bg-purple-200', 'border-purple-600');
                        });
                        quizOptions.appendChild(optionButton);
                    });
                    
                    document.getElementById('quiz-progress').textContent = `Question ${this.currentQuestionIndex + 1} of ${this.currentQuiz.questions.length}`;
                    
                    if (this.currentQuestionIndex === this.currentQuiz.questions.length - 1) {
                        document.getElementById('next-btn').classList.add('hidden');
                        document.getElementById('submit-btn').classList.remove('hidden');
                    } else {
                        document.getElementById('next-btn').classList.remove('hidden');
                        document.getElementById('submit-btn').classList.add('hidden');
                    }
                },

                nextQuestion() {
                    if (this.userAnswers[this.currentQuestionIndex] === undefined) {
                        this.showNotification('Please select an answer.', 'error');
                        return;
                    }
                    this.currentQuestionIndex++;
                    this.showQuestion();
                },

                submitQuiz() {
                    if (this.userAnswers[this.currentQuestionIndex] === undefined) {
                        this.showNotification('Please select an answer.', 'error');
                        return;
                    }
                    
                    let score = 0;
                    this.currentQuiz.questions.forEach((q, index) => {
                        if (q.answer === this.userAnswers[index]) {
                            score++;
                        }
                    });
                    
                    const questId = Object.keys(this.quizData).find(key => this.quizData[key] === this.currentQuiz);
                    const quest = this.quests.find(q => q.id == questId);
                    
                    if (score === this.currentQuiz.questions.length) {
                        this.user.balance += quest.reward;
                        quest.status = 'completed';
                        this.showNotification(`Quiz passed! $${quest.reward.toFixed(2)} added to your balance.`, 'success');
                    } else {
                        this.showNotification('Quiz failed. Please try again later.', 'error');
                    }
                    
                    this.updateHeader();
                    this.displayQuests();
                    this.closeModal(this.elements.quizModal);
                },

                // --- MODAL & NOTIFICATION LOGIC ---
                openModal(modal) {
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                    setTimeout(() => modal.querySelector('div').classList.remove('scale-95'), 10);
                },

                closeModal(modal) {
                     modal.querySelector('div').classList.add('scale-95');
                     setTimeout(() => {
                        modal.classList.add('hidden');
                        modal.classList.remove('flex');
                     }, 200);
                },
                
                showNotification(message, type = 'success') {
                    this.elements.notificationMessage.textContent = message;
                    
                    const toast = this.elements.notificationToast;
                    toast.className = `fixed bottom-24 md:bottom-8 right-8 text-white py-3 px-6 rounded-lg shadow-xl z-50 toast-in ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
                    
                    toast.classList.remove('hidden');
                    
                    setTimeout(() => {
                        toast.classList.add('hidden');
                    }, 3000);
                },
                
                // --- CAROUSEL LOGIC ---
                initCarousel() {
                    const carouselItems = [
                        { img: 'https://placehold.co/800x400/6c5ce7/white?text=Learn+and+Earn', title: 'Learn & Earn', subtitle: 'Complete quests to gain knowledge and rewards.'},
                        { img: 'https://placehold.co/800x400/00cec9/white?text=Unlock+New+Skills', title: 'Unlock New Skills', subtitle: 'Master topics from DeFi to NFTs.'},
                        { img: 'https://placehold.co/800x400/fd79a8/white?text=Grow+Your+Portfolio', title: 'Grow Your Portfolio', subtitle: 'Turn your knowledge into real assets.'}
                    ];
                    
                    this.elements.carousel.innerHTML = '';
                    this.elements.carouselDots.innerHTML = '';
                    
                    carouselItems.forEach((item, index) => {
                        // Create item
                        const itemDiv = document.createElement('div');
                        itemDiv.className = `carousel-item absolute w-full h-full ${index === 0 ? 'active' : ''}`;
                        itemDiv.innerHTML = `
                            <img src="${item.img}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black bg-opacity-40 flex flex-col justify-center items-center text-white p-4 text-center">
                                <h2 class="text-2xl md:text-3xl font-bold font-montserrat">${item.title}</h2>
                                <p class="mt-1 text-sm md:text-base">${item.subtitle}</p>
                            </div>
                        `;
                        this.elements.carousel.appendChild(itemDiv);
                        
                        // Create dot
                        const dot = document.createElement('button');
                        dot.className = `carousel-dot w-2.5 h-2.5 rounded-full transition ${index === 0 ? 'bg-white' : 'bg-white/50'}`;
                        dot.dataset.index = index;
                        this.elements.carouselDots.appendChild(dot);
                    });

                    let slideIndex = 0;
                    const slides = this.elements.carousel.querySelectorAll('.carousel-item');
                    const dots = this.elements.carouselDots.querySelectorAll('.carousel-dot');
                    
                    const showSlide = (n) => {
                        slideIndex = (n + slides.length) % slides.length;
                        slides.forEach(slide => slide.classList.remove('active'));
                        dots.forEach(dot => dot.classList.replace('bg-white', 'bg-white/50'));
                        slides[slideIndex].classList.add('active');
                        dots[slideIndex].classList.replace('bg-white/50', 'bg-white');
                    };
                    
                    const nextSlide = () => showSlide(slideIndex + 1);
                    
                    this.elements.carouselDots.addEventListener('click', (e) => {
                        if (e.target.matches('.carousel-dot')) {
                            showSlide(parseInt(e.target.dataset.index));
                        }
                    });

                    setInterval(nextSlide, 5000);
                },

                // --- EVENT BINDINGS ---
                bindEvents() {
                    // Filter and Sort listeners
                    this.elements.searchInput.addEventListener('input', () => { this.currentPage = 1; this.displayQuests(); });
                    this.elements.statusFilter.addEventListener('change', () => { this.currentPage = 1; this.displayQuests(); });
                    this.elements.sortFilter.addEventListener('change', () => { this.currentPage = 1; this.displayQuests(); });
                    
                    // Event delegation for quest cards
                    this.elements.questList.addEventListener('click', e => {
                        const card = e.target.closest('.quest-card');
                        if (!card) return;
                        
                        const questId = parseInt(card.dataset.questId, 10);
                        
                        if (e.target.closest('.start-quiz-btn:not([disabled])')) {
                            this.startQuiz(questId);
                        } else if (e.target.closest('.details-btn')) {
                            this.showNotification('Quest details page is a work in progress!', 'info');
                        }
                    });

                    // Quiz modal controls
                    document.getElementById('next-btn').addEventListener('click', () => this.nextQuestion());
                    document.getElementById('submit-btn').addEventListener('click', () => this.submitQuiz());
                    this.elements.quizModal.addEventListener('click', (e) => {
                       if (e.target === this.elements.quizModal) this.closeModal(this.elements.quizModal);
                    });

                    // Withdrawal modal controls
                    this.elements.withdrawBtns.forEach(btn => {
                        btn.addEventListener('click', () => {
                             document.getElementById('withdraw-balance').textContent = `$${this.user.balance.toFixed(2)}`;
                             this.openModal(this.elements.withdrawModal);
                        });
                    });
                    
                    document.getElementById('confirm-withdrawal-btn').addEventListener('click', () => {
                        const amount = parseFloat(document.getElementById('withdraw-amount').value);
                        if (isNaN(amount) || amount <= 0) {
                            this.showNotification('Please enter a valid amount.', 'error');
                            return;
                        }
                        if (amount > this.user.balance) {
                             this.showNotification('Insufficient funds.', 'error');
                             return;
                        }
                        this.user.balance -= amount;
                        this.updateHeader();
                        this.showNotification(`$${amount.toFixed(2)} withdrawn successfully.`, 'success');
                        this.closeModal(this.elements.withdrawModal);
                    });
                     document.getElementById('cancel-withdrawal-btn').addEventListener('click', () => this.closeModal(this.elements.withdrawModal));
                     this.elements.withdrawModal.addEventListener('click', (e) => {
                       if (e.target === this.elements.withdrawModal) this.closeModal(this.elements.withdrawModal);
                    });
                }
            };

            // Start the application
            App.init();
        });
    </script>
</body>
</html>
