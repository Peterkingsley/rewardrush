<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrowEasy - Gamified Learning & Rewards</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts using <link> for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">

    <style>
        /* Custom styles to complement Tailwind */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
        }
        .font-montserrat {
            font-family: 'Montserrat', sans-serif;
        }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        /* Styles for the carousel */
        .carousel-item {
            display: none;
            transition: opacity 1s ease-in-out;
        }
        .carousel-item.active {
            display: block;
        }
        /* Animation for notification toast */
        @keyframes toast-in {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .toast-in {
            animation: toast-in 0.5s ease-out forwards;
        }

        /* Loading Spinner */
        #loading-overlay {
            z-index: 100;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #6c5ce7;
            animation: spin 1s ease infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-white bg-opacity-90 flex items-center justify-center">
        <div class="spinner"></div>
    </div>

    <div id="app-container" class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8 opacity-0 transition-opacity duration-500">

        <!-- Header Section -->
        <header class="bg-white shadow-md rounded-2xl p-4 mb-8 flex flex-wrap items-center justify-between">
            <div class="flex items-center">
                <i class="fas fa-leaf text-3xl text-green-500 mr-3"></i>
                <h1 class="text-2xl font-bold font-montserrat text-gray-700">GrowEasy</h1>
            </div>
             <a href="profile.html" id="user-profile-link" class="flex items-center mt-4 sm:mt-0 cursor-pointer group">
                <div class="text-right mr-4">
                    <p class="font-semibold" id="user-name">User</p>
                    <p class="text-sm text-gray-500" id="user-balance">$0.00</p>
                </div>
                <img src="https://placehold.co/40x40/6c5ce7/white?text=U" id="user-avatar" alt="User Avatar" class="w-10 h-10 rounded-full group-hover:ring-2 group-hover:ring-purple-400 transition">
            </a>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Carousel Section -->
            <div class="relative mb-8 shadow-lg rounded-2xl overflow-hidden">
                <div id="carousel" class="relative w-full h-56 sm:h-64">
                    <!-- Carousel items will be injected by JS -->
                </div>
                <div id="carousel-dots" class="absolute bottom-4 left-1/2 -translate-x-1/2 flex space-x-2">
                    <!-- Carousel dots will be injected by JS -->
                </div>
            </div>

            <!-- Dashboard Overview -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl shadow-md flex items-center justify-between">
                    <div>
                        <p class="text-gray-500">Quests Completed</p>
                        <p class="text-3xl font-bold" id="quests-completed">0</p>
                    </div>
                    <i class="fas fa-check-circle text-green-500 text-4xl opacity-50"></i>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-md flex items-center justify-between">
                    <div>
                        <p class="text-gray-500">Total Earnings</p>
                        <p class="text-3xl font-bold" id="total-earnings">$0.00</p>
                    </div>
                    <i class="fas fa-coins text-yellow-500 text-4xl opacity-50"></i>
                </div>
                <button id="quest-history-btn" class="bg-white p-6 rounded-2xl shadow-md flex items-center justify-center text-lg font-bold transition-transform transform hover:scale-105 hover:bg-gray-50">
                    View History <i class="fas fa-history ml-3 text-gray-500"></i>
                </button>
                <button class="withdraw-btn bg-gradient-to-r from-purple-500 to-indigo-600 hover:from-purple-600 hover:to-indigo-700 text-white p-6 rounded-2xl shadow-lg flex items-center justify-center text-xl font-bold transition-transform transform hover:scale-105">
                    Withdraw Funds <i class="fas fa-wallet ml-3"></i>
                </button>
            </div>
            
            <!-- Quests Section -->
            <div class="bg-white rounded-2xl shadow-md p-6">
                <h2 class="text-2xl font-bold mb-6">Available Quests</h2>
                
                <!-- Filters -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <input type="text" id="quest-search-input" placeholder="Search quests..." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    <select id="filter-status" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        <option value="all">All Statuses</option>
                        <option value="not-started">Not Started</option>
                        <option value="completed">Completed</option>
                    </select>
                    <select id="sort-reward" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        <option value="default">Sort by Reward</option>
                        <option value="high-to-low">High to Low</option>
                        <option value="low-to-high">Low to High</option>
                    </select>
                </div>

                <!-- Quest List -->
                <div id="quest-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Quest cards will be dynamically inserted here -->
                </div>

                <!-- Pagination -->
                <nav id="pagination" class="flex justify-center items-center mt-8 space-x-2">
                    <!-- Pagination controls will be dynamically inserted here -->
                </nav>
            </div>
        </main>
    </div>

    <!-- Modal for Quiz -->
    <div id="quiz-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl p-6 sm:p-8 transform transition-transform scale-95 max-h-[90vh] flex flex-col">
            <h2 id="quiz-title" class="text-2xl font-bold mb-2">Quiz Title</h2>
            <p id="quiz-description" class="text-gray-600 mb-6">Answer the questions below.</p>
            <div class="flex-grow overflow-y-auto pr-2">
                 <div id="quiz-content">
                    <!-- Question will be injected here -->
                </div>
                <div id="quiz-options" class="grid grid-cols-1 sm:grid-cols-2 gap-4 my-6">
                     <!-- Options will be injected here -->
                </div>
            </div>
            <div class="flex-shrink-0 flex justify-between items-center mt-6 pt-4 border-t">
                 <p id="quiz-progress" class="text-gray-500 font-semibold"></p>
                 <div>
                    <button id="next-btn" class="bg-purple-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-purple-700 transition">Next</button>
                    <button id="submit-btn" class="bg-green-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-green-700 transition hidden">Submit</button>
                 </div>
            </div>
        </div>
    </div>
    
    <!-- Modal for Withdrawal -->
    <div id="withdraw-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8 transform transition-transform scale-95">
             <h2 class="text-2xl font-bold mb-4">Withdraw Funds</h2>
             <p class="mb-4">Enter the amount to withdraw. Balance: <span id="withdraw-balance" class="font-bold">$0.00</span>.</p>
             <input type="number" id="withdraw-amount" placeholder="0.00" class="w-full p-3 border border-gray-300 rounded-lg mb-4 focus:ring-2 focus:ring-purple-500">
             <div class="flex justify-end space-x-4">
                 <button id="cancel-withdrawal-btn" class="bg-gray-200 text-gray-800 font-bold py-2 px-6 rounded-lg hover:bg-gray-300">Cancel</button>
                 <button id="confirm-withdrawal-btn" class="bg-purple-600 text-white font-bold py-2 px-6 rounded-lg hover:bg-purple-700">Confirm</button>
             </div>
        </div>
    </div>
    
    <!-- Modal for Quest History -->
    <div id="history-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl p-8 transform transition-transform scale-95 max-h-[90vh] flex flex-col">
             <div class="flex-shrink-0 flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">Quest History</h2>
                <button id="close-history-btn" class="text-gray-500 hover:text-gray-800 text-2xl">&times;</button>
             </div>
             <div id="history-list" class="flex-grow overflow-y-auto pr-2 space-y-4">
                <!-- History items will be injected here -->
             </div>
        </div>
    </div>

    <!-- Custom Notification/Toast -->
    <div id="notification-toast" class="fixed bottom-8 right-8 bg-gray-800 text-white py-3 px-6 rounded-lg shadow-xl z-50 hidden">
        <p id="notification-message">Notification message</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const App = {
                // --- CONFIG & STATE ---
                apiBaseUrl: '', // Assuming same origin; adjust if API is elsewhere
                user: {},
                quests: [],
                completedQuestIds: [],
                currentPage: 1,
                itemsPerPage: 6,
                currentQuiz: null,
                currentQuestionIndex: 0,
                userAnswers: [],

                elements: {
                    loadingOverlay: document.getElementById('loading-overlay'),
                    appContainer: document.getElementById('app-container'),
                    userName: document.getElementById('user-name'),
                    userBalance: document.getElementById('user-balance'),
                    userAvatar: document.getElementById('user-avatar'),
                    questsCompleted: document.getElementById('quests-completed'),
                    totalEarnings: document.getElementById('total-earnings'),
                    questList: document.getElementById('quest-list'),
                    pagination: document.getElementById('pagination'),
                    searchInput: document.getElementById('quest-search-input'),
                    statusFilter: document.getElementById('filter-status'),
                    sortFilter: document.getElementById('sort-reward'),
                    withdrawBtns: document.querySelectorAll('.withdraw-btn'),
                    quizModal: document.getElementById('quiz-modal'),
                    withdrawModal: document.getElementById('withdraw-modal'),
                    historyModal: document.getElementById('history-modal'),
                    notificationToast: document.getElementById('notification-toast'),
                    notificationMessage: document.getElementById('notification-message'),
                    carousel: document.getElementById('carousel'),
                    carouselDots: document.getElementById('carousel-dots'),
                    questHistoryBtn: document.getElementById('quest-history-btn'),
                    closeHistoryBtn: document.getElementById('close-history-btn'),
                    historyList: document.getElementById('history-list'),
                },
                
                async init() {
                    try {
                        this.showLoading();
                        await this.loadUserData();
                        await this.loadQuests();
                        this.updateHeader();
                        this.displayQuests();
                        this.initCarousel();
                        this.bindEvents();
                    } catch (error) {
                        console.error("Initialization failed:", error);
                        this.showNotification("Failed to load application data. Please refresh.", "error");
                    } finally {
                        this.hideLoading();
                    }
                },

                async loadUserData() {
                    // Simulate getting a logged-in user's ID
                    const userId = 'sampleUser'; // In a real app, this would come from a session
                    const response = await fetch(`${this.apiBaseUrl}/api/profile/${userId}`);
                    if (!response.ok) throw new Error('Failed to fetch user profile.');
                    this.user = await response.json();
                    
                    const overviewResponse = await fetch(`${this.apiBaseUrl}/quest-overview?userId=${userId}`);
                    if (!overviewResponse.ok) throw new Error('Failed to fetch quest overview.');
                    const overviewData = await overviewResponse.json();
                    this.completedQuestIds = overviewData.questsCompleted.map(q => q.quest_id);
                },

                async loadQuests() {
                    const response = await fetch(`${this.apiBaseUrl}/quests`);
                    if (!response.ok) throw new Error('Failed to fetch quests.');
                    const data = await response.json();
                    this.quests = data.quests.map(q => ({
                        ...q,
                        status: this.completedQuestIds.includes(q.id) ? 'completed' : 'not-started'
                    }));
                },

                updateHeader() {
                    this.elements.userName.textContent = this.user.fullName || 'User';
                    this.elements.userBalance.textContent = `$${(this.user.totalEarnings || 0).toFixed(2)}`;
                    this.elements.userAvatar.src = this.user.avatar || `https://placehold.co/40x40/6c5ce7/white?text=${(this.user.fullName || 'U').charAt(0)}`;
                    this.elements.questsCompleted.textContent = this.completedQuestIds.length;
                    this.elements.totalEarnings.textContent = `$${(this.user.totalEarnings || 0).toFixed(2)}`;
                },
                
                displayQuests() {
                    this.elements.questList.innerHTML = '';
                    
                    const searchTerm = this.elements.searchInput.value.toLowerCase();
                    const statusFilter = this.elements.statusFilter.value;
                    const sortOrder = this.elements.sortFilter.value;
                    
                    let filteredQuests = this.quests.filter(quest => {
                        const matchesSearch = quest.title.toLowerCase().includes(searchTerm) || quest.description.toLowerCase().includes(searchTerm);
                        const matchesStatus = (statusFilter === 'all') || (quest.status === statusFilter);
                        return matchesSearch && matchesStatus;
                    });
                    
                    const parseReward = (rewardStr) => parseFloat(String(rewardStr).replace(/[^0-9.]/g, ''));

                    if (sortOrder === 'high-to-low') {
                        filteredQuests.sort((a, b) => parseReward(b.reward) - parseReward(a.reward));
                    } else if (sortOrder === 'low-to-high') {
                        filteredQuests.sort((a, b) => parseReward(a.reward) - parseReward(b.reward));
                    }
                    
                    const startIndex = (this.currentPage - 1) * this.itemsPerPage;
                    const paginatedQuests = filteredQuests.slice(startIndex, startIndex + this.itemsPerPage);

                    if (paginatedQuests.length === 0) {
                        this.elements.questList.innerHTML = `<p class="text-gray-500 md:col-span-2 lg:col-span-3 text-center">No quests found.</p>`;
                    } else {
                        paginatedQuests.forEach(quest => {
                            const card = this.createQuestCard(quest);
                            this.elements.questList.appendChild(card);
                        });
                    }
                    
                    this.renderPagination(filteredQuests.length);
                },

                createQuestCard(quest) {
                    const card = document.createElement('div');
                    card.className = 'quest-card bg-gray-50 border border-gray-200 rounded-xl p-6 flex flex-col justify-between transition-shadow hover:shadow-lg';
                    card.dataset.questId = quest.id;
                    
                    const isCompleted = quest.status === 'completed';
                    
                    const statusBadge = isCompleted 
                        ? `<span class="bg-green-100 text-green-800 text-xs font-medium px-2.5 py-0.5 rounded-full">Completed</span>`
                        : `<span class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded-full">Available</span>`;

                    const rewardValue = String(quest.reward).startsWith('$') ? quest.reward : `$${parseFloat(quest.reward).toFixed(2)}`;
                    
                    card.innerHTML = `
                        <div class="flex-grow">
                            <div class="flex justify-between items-start mb-2">
                                <h3 class="text-lg font-bold text-gray-800 pr-2">${quest.title}</h3>
                                ${statusBadge}
                            </div>
                            <p class="text-gray-600 mb-4 text-sm">${quest.description}</p>
                        </div>
                        <div class="mt-4 pt-4 border-t border-gray-200">
                             <div class="flex justify-between items-center mb-4">
                                <p class="font-bold text-green-600 text-lg">${rewardValue}</p>
                                <button class="details-btn text-purple-600 hover:underline text-sm font-semibold">View Details</button>
                            </div>
                            <button class="start-quiz-btn w-full py-2 px-4 rounded-lg font-semibold transition ${isCompleted ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-purple-600 text-white hover:bg-purple-700'}" ${isCompleted ? 'disabled' : ''}>
                                ${isCompleted ? 'Completed' : 'Start Quiz'}
                            </button>
                        </div>
                    `;
                    return card;
                },

                renderPagination(totalItems) {
                    this.elements.pagination.innerHTML = '';
                    const pageCount = Math.ceil(totalItems / this.itemsPerPage);
                    if (pageCount <= 1) return;

                    for (let i = 1; i <= pageCount; i++) {
                        const pageLink = document.createElement('button');
                        pageLink.textContent = i;
                        pageLink.className = `px-4 py-2 rounded-md font-semibold transition ${this.currentPage === i ? 'bg-purple-600 text-white' : 'bg-white text-gray-700 hover:bg-gray-200'}`;
                        pageLink.addEventListener('click', () => {
                            this.currentPage = i;
                            this.displayQuests();
                        });
                        this.elements.pagination.appendChild(pageLink);
                    }
                },

                async startQuiz(questId) {
                    try {
                        this.showLoading();
                        const response = await fetch(`${this.apiBaseUrl}/quests/${questId}/questions`);
                        if (!response.ok) throw new Error('Failed to load quiz questions.');
                        const data = await response.json();
                        
                        if (!data.questions || data.questions.length === 0) {
                            this.showNotification('Quiz not available for this quest yet.', 'error');
                            return;
                        }
                        
                        this.currentQuiz = {
                            id: questId,
                            title: this.quests.find(q => q.id === questId).title,
                            description: 'Test your knowledge to complete the quest.',
                            questions: data.questions
                        };

                        this.currentQuestionIndex = 0;
                        this.userAnswers = [];
                        document.getElementById('quiz-title').textContent = this.currentQuiz.title;
                        document.getElementById('quiz-description').textContent = this.currentQuiz.description;
                        this.showQuestion();
                        this.openModal(this.elements.quizModal);
                    } catch (error) {
                        console.error("Error starting quiz:", error);
                        this.showNotification(error.message, "error");
                    } finally {
                        this.hideLoading();
                    }
                },

                showQuestion() {
                    const question = this.currentQuiz.questions[this.currentQuestionIndex];
                    const quizContent = document.getElementById('quiz-content');
                    const quizOptions = document.getElementById('quiz-options');
                    quizContent.innerHTML = `<p class="text-lg font-semibold">${question.question}</p>`;
                    quizOptions.innerHTML = '';

                    const options = Array.isArray(question.options) ? question.options : JSON.parse(question.options);

                    options.forEach(option => {
                        const optionButton = document.createElement('button');
                        optionButton.textContent = option;
                        optionButton.className = 'w-full text-left p-4 border rounded-lg hover:bg-purple-100 hover:border-purple-500 transition';
                        optionButton.addEventListener('click', () => {
                            this.userAnswers[this.currentQuestionIndex] = option;
                            Array.from(quizOptions.children).forEach(btn => btn.classList.remove('bg-purple-200', 'border-purple-600'));
                            optionButton.classList.add('bg-purple-200', 'border-purple-600');
                        });
                        quizOptions.appendChild(optionButton);
                    });
                    
                    document.getElementById('quiz-progress').textContent = `Question ${this.currentQuestionIndex + 1} of ${this.currentQuiz.questions.length}`;
                    
                    if (this.currentQuestionIndex === this.currentQuiz.questions.length - 1) {
                        document.getElementById('next-btn').classList.add('hidden');
                        document.getElementById('submit-btn').classList.remove('hidden');
                    } else {
                        document.getElementById('next-btn').classList.remove('hidden');
                        document.getElementById('submit-btn').classList.add('hidden');
                    }
                },

                nextQuestion() {
                    if (this.userAnswers[this.currentQuestionIndex] === undefined) {
                        this.showNotification('Please select an answer.', 'error');
                        return;
                    }
                    this.currentQuestionIndex++;
                    this.showQuestion();
                },

                async submitQuiz() {
                    if (this.userAnswers[this.currentQuestionIndex] === undefined) {
                        this.showNotification('Please select an answer.', 'error');
                        return;
                    }
                    
                    this.showLoading();
                    try {
                        const response = await fetch(`${this.apiBaseUrl}/submit-quiz/${this.currentQuiz.id}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ answers: this.userAnswers })
                        });
                        
                        const result = await response.json();
                        
                        if (result.success) {
                            this.showNotification(`Quiz passed! ${result.reward} added to your balance.`, 'success');
                            await this.loadUserData(); // Refresh user data
                            await this.loadQuests(); // Refresh quest statuses
                            this.updateHeader();
                            this.displayQuests();
                        } else {
                            this.showNotification(result.message || 'Quiz failed. Please try again.', 'error');
                        }
                    } catch (error) {
                        this.showNotification('An error occurred while submitting the quiz.', 'error');
                    } finally {
                        this.closeModal(this.elements.quizModal);
                        this.hideLoading();
                    }
                },
                
                async showQuestHistory() {
                    this.showLoading();
                    try {
                        const userId = 'sampleUser'; // In a real app, this comes from session
                        const response = await fetch(`${this.apiBaseUrl}/quest-overview?userId=${userId}`);
                        if(!response.ok) throw new Error('Could not load history.');
                        const data = await response.json();
                        
                        this.elements.historyList.innerHTML = ''; // Clear previous
                        
                        if (data.questsCompleted && data.questsCompleted.length > 0) {
                            data.questsCompleted.forEach(item => {
                                const quest = this.quests.find(q => q.id === item.quest_id);
                                if (!quest) return;

                                const historyItem = document.createElement('div');
                                historyItem.className = 'p-4 bg-gray-50 rounded-lg border flex justify-between items-center';
                                const completionDate = new Date(item.completed_at).toLocaleDateString();
                                const rewardValue = String(quest.reward).startsWith('$') ? quest.reward : `$${parseFloat(quest.reward).toFixed(2)}`;

                                historyItem.innerHTML = `
                                    <div>
                                        <p class="font-semibold">${quest.title}</p>
                                        <p class="text-sm text-gray-500">Completed on: ${completionDate}</p>
                                    </div>
                                    <p class="font-bold text-green-600">${rewardValue}</p>
                                `;
                                this.elements.historyList.appendChild(historyItem);
                            });
                        } else {
                            this.elements.historyList.innerHTML = `<p class="text-gray-500 text-center">No completed quests yet.</p>`;
                        }
                        this.openModal(this.elements.historyModal);
                    } catch (error) {
                        this.showNotification(error.message, 'error');
                    } finally {
                        this.hideLoading();
                    }
                },

                openModal(modal) {
                    modal.classList.remove('hidden');
                    modal.classList.add('flex');
                    setTimeout(() => modal.querySelector('div').classList.remove('scale-95'), 10);
                },

                closeModal(modal) {
                     modal.querySelector('div').classList.add('scale-95');
                     setTimeout(() => {
                        modal.classList.add('hidden');
                        modal.classList.remove('flex');
                     }, 200);
                },
                
                showNotification(message, type = 'success') {
                    this.elements.notificationMessage.textContent = message;
                    
                    const toast = this.elements.notificationToast;
                    toast.className = `fixed bottom-8 right-8 text-white py-3 px-6 rounded-lg shadow-xl z-50 toast-in ${type === 'success' ? 'bg-green-600' : 'bg-red-600'}`;
                    
                    toast.classList.remove('hidden');
                    
                    setTimeout(() => {
                        toast.classList.add('hidden');
                    }, 3000);
                },
                
                initCarousel() {
                    const carouselItems = [
                        { img: 'https://placehold.co/800x400/6c5ce7/white?text=Learn+and+Earn', title: 'Learn & Earn', subtitle: 'Complete quests to gain knowledge and rewards.'},
                        { img: 'https://placehold.co/800x400/00cec9/white?text=Unlock+New+Skills', title: 'Unlock New Skills', subtitle: 'Master topics from DeFi to NFTs.'},
                        { img: 'https://placehold.co/800x400/fd79a8/white?text=Grow+Your+Portfolio', title: 'Grow Your Portfolio', subtitle: 'Turn your knowledge into real assets.'}
                    ];
                    
                    this.elements.carousel.innerHTML = '';
                    this.elements.carouselDots.innerHTML = '';
                    
                    carouselItems.forEach((item, index) => {
                        const itemDiv = document.createElement('div');
                        itemDiv.className = `carousel-item absolute w-full h-full ${index === 0 ? 'active' : ''}`;
                        itemDiv.innerHTML = `
                            <img src="${item.img}" class="w-full h-full object-cover" alt="${item.title}">
                            <div class="absolute inset-0 bg-black bg-opacity-50 flex flex-col justify-center items-center text-white p-4 text-center">
                                <h2 class="text-3xl md:text-4xl font-bold font-montserrat">${item.title}</h2>
                                <p class="mt-2 text-lg">${item.subtitle}</p>
                            </div>
                        `;
                        this.elements.carousel.appendChild(itemDiv);
                        
                        const dot = document.createElement('button');
                        dot.className = `carousel-dot w-3 h-3 rounded-full transition ${index === 0 ? 'bg-white' : 'bg-white/50'}`;
                        dot.dataset.index = index;
                        this.elements.carouselDots.appendChild(dot);
                    });

                    let slideIndex = 0;
                    const slides = this.elements.carousel.querySelectorAll('.carousel-item');
                    const dots = this.elements.carouselDots.querySelectorAll('.carousel-dot');
                    
                    const showSlide = (n) => {
                        slideIndex = (n + slides.length) % slides.length;
                        slides.forEach(slide => slide.classList.remove('active'));
                        dots.forEach(dot => dot.classList.replace('bg-white', 'bg-white/50'));
                        slides[slideIndex].classList.add('active');
                        dots[slideIndex].classList.replace('bg-white/50', 'bg-white');
                    };
                    
                    this.elements.carouselDots.addEventListener('click', (e) => {
                        if (e.target.matches('.carousel-dot')) {
                            showSlide(parseInt(e.target.dataset.index));
                        }
                    });

                    setInterval(() => showSlide(slideIndex + 1), 5000);
                },

                showLoading() {
                    this.elements.loadingOverlay.classList.remove('hidden');
                    this.elements.appContainer.classList.add('opacity-0');
                },

                hideLoading() {
                    this.elements.loadingOverlay.classList.add('hidden');
                    this.elements.appContainer.classList.remove('opacity-0');
                },

                bindEvents() {
                    this.elements.searchInput.addEventListener('input', () => { this.currentPage = 1; this.displayQuests(); });
                    this.elements.statusFilter.addEventListener('change', () => { this.currentPage = 1; this.displayQuests(); });
                    this.elements.sortFilter.addEventListener('change', () => { this.currentPage = 1; this.displayQuests(); });
                    
                    this.elements.questList.addEventListener('click', e => {
                        const card = e.target.closest('.quest-card');
                        if (!card) return;
                        const questId = parseInt(card.dataset.questId, 10);
                        if (e.target.closest('.start-quiz-btn:not([disabled])')) this.startQuiz(questId);
                    });

                    document.getElementById('next-btn').addEventListener('click', () => this.nextQuestion());
                    document.getElementById('submit-btn').addEventListener('click', () => this.submitQuiz());
                    this.elements.quizModal.addEventListener('click', (e) => {
                       if (e.target === this.elements.quizModal) this.closeModal(this.elements.quizModal);
                    });

                    this.elements.withdrawBtns.forEach(btn => {
                        btn.addEventListener('click', () => {
                             document.getElementById('withdraw-balance').textContent = `$${(this.user.totalEarnings || 0).toFixed(2)}`;
                             this.openModal(this.elements.withdrawModal);
                        });
                    });
                    
                    document.getElementById('confirm-withdrawal-btn').addEventListener('click', async () => {
                        const amount = parseFloat(document.getElementById('withdraw-amount').value);
                        if (isNaN(amount) || amount <= 0) return this.showNotification('Please enter a valid amount.', 'error');
                        if (amount > this.user.totalEarnings) return this.showNotification('Insufficient funds.', 'error');
                        
                        this.showLoading();
                        try {
                            const response = await fetch(`${this.apiBaseUrl}/withdraw`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ amount })
                            });
                            const result = await response.json();
                            if (!response.ok) throw new Error(result.error || 'Withdrawal failed.');
                            
                            this.showNotification(`Withdrawal successful! Your code: ${result.code}`, 'success');
                            await this.loadUserData();
                            this.updateHeader();
                            this.closeModal(this.elements.withdrawModal);
                        } catch(error) {
                            this.showNotification(error.message, 'error');
                        } finally {
                            this.hideLoading();
                        }
                    });
                     document.getElementById('cancel-withdrawal-btn').addEventListener('click', () => this.closeModal(this.elements.withdrawModal));

                     this.elements.questHistoryBtn.addEventListener('click', () => this.showQuestHistory());
                     this.elements.closeHistoryBtn.addEventListener('click', () => this.closeModal(this.elements.historyModal));
                     this.elements.historyModal.addEventListener('click', (e) => {
                       if (e.target === this.elements.historyModal) this.closeModal(this.elements.historyModal);
                    });
                }
            };

            App.init();
        });
    </script>
</body>
</html>
